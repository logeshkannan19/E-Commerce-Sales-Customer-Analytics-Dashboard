<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Logesh Kannan</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a1a'/><text x='50' y='68' font-family='system-ui' font-size='48' font-weight='700' fill='white' text-anchor='middle'>LK</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .error-container {
            text-align: center;
            max-width: 480px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            color: var(--text-primary);
            margin-bottom: 24px;
        }
        .error-code span {
            color: var(--text-muted);
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        p {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .error-links {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        a {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-primary);
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--text-muted);
        }
        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            .error-links {
                flex-direction: column;
            }
            a {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">
            4<span>0</span>4
        </div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <div class="error-links">
            <a href="/" class="btn-primary">Go Home</a>
            <a href="/#projects" class="btn-secondary">View Projects</a>
        </div>
    </div>
</body>
</html>
